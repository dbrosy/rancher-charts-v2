{{- if .Values.wordpress.php.uploads.enabled -}}
apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ (split "/" $.Template.Name)._2 }}-php-uploads
data:
  uploads.ini: |
    file_uploads = On
    memory_limit = 256M
    upload_max_filesize = 64M
    post_max_size = 64M
    max_execution_time = 180
    max_input_time = 180
    max_input_vars = 3000
    default_socket_timeout = 300